<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 110" width="100%" height="100%">
  <defs>
    <!-- Glowing Laser Gradient -->
    <linearGradient id="laserGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f3ff" stop-opacity="1" />
      <stop offset="100%" stop-color="#ff0055" stop-opacity="0.1" />
    </linearGradient>

    <!-- Layer Gradients -->
    <linearGradient id="layer1" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#4facfe" stop-opacity="0.2" /><stop offset="100%" stop-color="#00f2fe" stop-opacity="0.05" /></linearGradient>
    <linearGradient id="layer2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#2af598" stop-opacity="0.3" /><stop offset="100%" stop-color="#009efd" stop-opacity="0.1" /></linearGradient>
    <linearGradient id="layer3" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#f43f5e" stop-opacity="0.4" /><stop offset="100%" stop-color="#ca8a04" stop-opacity="0.1" /></linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Technical Background Grid Lines (Stretched horizontally) -->
  <g opacity="0.03">
    <path d="M 0,25 L 1200,25 M 0,55 L 1200,55 M 0,85 L 1200,85" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,110 M 200,0 L 200,110 M 300,0 L 300,110 M 400,0 L 400,110 M 600,0 L 600,110 M 800,0 L 800,110 M 1000,0 L 1000,110" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Left Side Interface Corner Accent -->
  <path d="M 15,20 L 5,20 L 5,40" fill="none" stroke="#374151" stroke-width="1.5" />

  <!-- ================= LOGO GRAPHIC ENGINE ================= -->
  <g transform="translate(15, 0)">
    <!-- Layer 1 -->
    <polygon points="50,32 75,22 75,82 50,92" fill="url(#layer1)" stroke="#00f3ff" stroke-width="1.2" stroke-dasharray="3 1" />
    <!-- Layer 2 -->
    <polygon points="79,20 93,15 93,75 79,80" fill="url(#layer2)" stroke="#2af598" stroke-width="1.5" />
    <!-- Layer 3 -->
    <polygon points="97,14 135,2 135,62 97,74" fill="url(#layer3)" stroke="#ff0055" stroke-width="1.2" />

    <!-- X-Ray Attenuation Ray -->
    <path d="M 5,60 L 62,60" stroke="#00f3ff" stroke-width="4" stroke-linecap="round" filter="url(#glow)" />
    <path d="M 5,60 L 62,60" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" />
    <path d="M 62,60 Q 77,35 88,58 T 115,56" fill="none" stroke="#2af598" stroke-width="2.5" opacity="0.8" />
    <path d="M 115,56 L 170,56" stroke="#ff0055" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.6" />
    <polygon points="170,56 164,53 164,59" fill="#ff0055" opacity="0.6" />
    
    <circle cx="62" cy="60" r="3" fill="#ffffff" filter="url(#glow)"/>
  </g>

  <!-- ================= TYPOGRAPHY ================= -->
  <!-- Main Title -->
  <text x="215" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="46" fill="#ffffff" letter-spacing="1.5">
    Attenu<tspan fill="#00f3ff">X</tspan>
  </text>

  <!-- Subtitle Text aligned next to it -->
  <text x="218" y="84" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="11" fill="#4b5563" letter-spacing="4">
    MULTILAYER X-RAY SIMULATOR
  </text>

  <!-- Right Side Interface Corner Accent -->
  <path d="M 1185,20 L 1195,20 L 1195,40" fill="none" stroke="#374151" stroke-width="1.5" />
</svg>
